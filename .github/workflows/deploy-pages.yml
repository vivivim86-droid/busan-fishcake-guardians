name: Deploy Busan Fishcake Guardians

on:
  push:
    branches: [main]
    paths:
      - 'deploy/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Reconstruct verified game build
        shell: bash
        run: |
          cat deploy/game.zip.b64.part-* > game.zip.b64
          base64 --decode game.zip.b64 > game.zip
          mkdir package
          unzip -q game.zip -d package || true
          test -f package/dist/index.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./package/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
